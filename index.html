<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HER Agent OS</title>

<style>
body{
    background:#0f172a;
    color:white;
    font-family:Arial,sans-serif;
    padding:40px;
}

.container{
    max-width:900px;
    margin:0 auto;
}

h1{
    font-size:48px;
    margin-bottom:10px;
}

.subtitle{
    color:#94a3b8;
    margin-bottom:30px;
}

.status-box{
    background:#1e293b;
    padding:20px;
    border-radius:16px;
    margin-bottom:30px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(2, 1fr);
    gap:20px;
}

.card{
    background:#1e293b;
    padding:25px;
    border-radius:16px;
}

.card h2{
    font-size:22px;
    margin-bottom:15px;
}

.card p{
    color:#cbd5e1;
    font-size:16px;
}

.badge{
    display:inline-block;
    margin-top:10px;
    padding:8px 12px;
    background:#334155;
    border-radius:20px;
    font-size:14px;
}

.footer{
    margin-top:40px;
    color:#94a3b8;
    text-align:center;
}
</style>
</head>

<body>

<div class="container">

    <h1>HER Agent OS</h1>
    <p class="subtitle">개인 AI 비서 대시보드</p>

    <div class="status-box">
        <h2>오늘의 상태</h2>
        <p id="today"></p>
        <p id="clock"></p>
    </div>

    <div class="grid">

        <div class="card">
            <h2>🏠 부동산 투자 비서</h2>
            <p>네이버 부동산 시세 수집 준비 중</p>
            <span class="badge">상태: 설계 단계</span>
        </div>

        <div class="card">
            <h2>📈 시장 분석 비서</h2>
            <p id="market-data">시장 데이터를 불러오는 중...</p>
            <span class="badge">상태: 데이터 연결 전</span>
        </div>

        <div class="card">
            <h2>📚 공인중개사 학습 비서</h2>
            <p>오늘의 문제 출제 기능 준비 중</p>
            <span class="badge">상태: 콘텐츠 설계 중</span>
        </div>

        <div class="card">
            <h2>🤖 개인 비서</h2>
            <p>일정·메일·알림 연동 준비 중</p>
            <span class="badge">상태: 자동화 연결 전</span>
        </div>

    </div>

    <p class="footer">현재 상태 : Day 4 개발중</p>

</div>

<script>
function updateTime(){
    const now = new Date();

    const dateText = now.toLocaleDateString("ko-KR", {
        year:"numeric",
        month:"long",
        day:"numeric",
        weekday:"long"
    });

    const timeText = now.toLocaleTimeString("ko-KR");

    document.getElementById("today").innerText = "날짜: " + dateText;
    document.getElementById("clock").innerText = "현재 시간: " + timeText;
}

async function loadCryptoPrice(){
    const url = "https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum&vs_currencies=usd,krw&include_24hr_change=true";

    try{
        const response = await fetch(url);
        const data = await response.json();

        const btcUsd = data.bitcoin.usd.toLocaleString();
        const btcKrw = data.bitcoin.krw.toLocaleString();
        const ethUsd = data.ethereum.usd.toLocaleString();
        const ethKrw = data.ethereum.krw.toLocaleString();

        document.getElementById("market-data").innerHTML = `
            <strong>Bitcoin</strong><br>
            $${btcUsd} / ₩${btcKrw}<br><br>
            <strong>Ethereum</strong><br>
            $${ethUsd} / ₩${ethKrw}
        `;
    }catch(error){
        document.getElementById("market-data").innerText = "시장 데이터를 불러오지 못했습니다.";
    }
}

updateTime();
setInterval(updateTime, 1000);

loadCryptoPrice();
setInterval(loadCryptoPrice, 60000);
</script>

</body>
</html>
